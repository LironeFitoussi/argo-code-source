name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test

  build-push-deploy:
    name: Build, Push & Update Manifest
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag (short SHA)
        id: tag
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            lironefitoussi/react-app:${{ steps.tag.outputs.SHA }}
            lironefitoussi/react-app:latest

      - name: Update k8s manifest
        run: |
          sed -i "s|image: lironefitoussi/react-app:.*|image: lironefitoussi/react-app:${{ steps.tag.outputs.SHA }}|" k8s/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: deploy image ${{ steps.tag.outputs.SHA }}"
          git push
